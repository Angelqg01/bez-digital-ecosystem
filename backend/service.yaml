# ===================================================
# BeZhas Backend — Cloud Run Service v2.0
# ===================================================
# Deploy con: gcloud run services replace service.yaml --region europe-west1
#
# GCP Project: totemic-bonus-479312-c6
# Región: europe-west1 (Bélgica — GDPR compliant, latencia ES ~15ms)
# ===================================================

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: bezhas-backend
  labels:
    cloud.googleapis.com/location: europe-west1
    app: bezhas-backend
    version: "2.0"
  annotations:
    run.googleapis.com/description: "BeZhas Web3 Platform — Backend API & AI Engine"
    run.googleapis.com/ingress: all
    run.googleapis.com/launch-stage: GA

spec:
  template:
    metadata:
      annotations:
        # ── Auto-scaling ────────────────────────────────────
        # min=1 evita cold starts en producción
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "20"
        autoscaling.knative.dev/target: "80"

        # ── CPU siempre asignada (para WebSockets y crons) ──
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/execution-environment: gen2

        # ── Startup boost (reduce cold start time) ───────────
        run.googleapis.com/startup-cpu-boost: "true"

        # ── Acceso a Secret Manager (SA con permiso) ─────────
        # La SA debe tener: secretmanager.secretAccessor

    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      serviceAccountName: bezhas-backend-sa@totemic-bonus-479312-c6.iam.gserviceaccount.com

      containers:
        - name: bezhas-backend
          # Imagen actualizada en cada deploy por cloudbuild.yaml
          image: gcr.io/totemic-bonus-479312-c6/bezhas-backend:latest

          ports:
            - name: http1
              containerPort: 8080

          resources:
            limits:
              cpu: "2"
              memory: "2Gi"
            requests:
              cpu: "500m"
              memory: "512Mi"

          # ── Variables de entorno ────────────────────────────
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "8080"
            - name: LOG_LEVEL
              value: "info"
            - name: DISABLE_BULLMQ
              value: "true"
            - name: DISABLE_BLOCKCHAIN_LISTENER
              value: "true"
            - name: FRONTEND_URL
              value: "https://bez.digital"
            - name: ALLOWED_ORIGINS
              value: "https://bez.digital,https://www.bez.digital,https://bezhas-frontend-371791663100.us-central1.run.app"

            # ── Secrets desde GCP Secret Manager ─────────────
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: mongodb-uri
                  key: latest

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: latest

            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: stripe-secret-key
                  key: latest

            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: stripe-webhook-secret
                  key: latest

            - name: HOT_WALLET_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: hot-wallet-private-key
                  key: latest

            - name: RELAYER_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: relayer-private-key
                  key: latest

            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gemini-api-key
                  key: latest

            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-api-key
                  key: latest

            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-url
                  key: latest

            - name: COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: cookie-secret
                  key: latest

            - name: DISCORD_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: discord-webhook-url
                  key: latest

            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: telegram-bot-token
                  key: latest

            # ── Blockchain (no secreto) ───────────────────────
            - name: POLYGON_RPC_URL
              value: "https://polygon-bor.publicnode.com"
            - name: BEZCOIN_CONTRACT_ADDRESS
              value: "0xEcBa873B534C54DE2B62acDE232ADCa4369f11A8"
            - name: QUALITY_ESCROW_ADDRESS
              value: "0x3088573c025F197A886b97440761990c9A9e83C9"
            - name: TREASURY_WALLET
              value: "0x89c23890c742d710265dd61be789c71dc8999b12"

          # ── Probes ──────────────────────────────────────────
          # Startup: espera hasta 60s para que el servidor arranque
          startupProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 12

          # Liveness: reinicia el contenedor si se cuelga
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          # Readiness: quita de rotación si no puede servir tráfico
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

  traffic:
    - percent: 100
      latestRevision: true
