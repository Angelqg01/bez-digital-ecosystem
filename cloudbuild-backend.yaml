substitutions:
  _REGION: "us-central1"
  _ARTIFACT_REPO: "bezhas"
  _TAG: "v2-hotfix"

steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/bezhas-backend:${_TAG}"
      - "-f"
      - "backend/Dockerfile.production"
      - "backend"
    id: "build-backend"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/bezhas-backend:${_TAG}"
    id: "push-backend"
    waitFor: ["build-backend"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "bezhas-backend"
      - "--image"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/bezhas-backend:${_TAG}"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--port"
      - "8080"
      - "--min-instances"
      - "1"
      - "--max-instances"
      - "10"
      - "--memory"
      - "2Gi"
      - "--cpu"
      - "2"
      - "--concurrency"
      - "80"
      - "--timeout"
      - "300"
      - "--set-env-vars"
      - "NODE_ENV=production,GCP_PROJECT_ID=$PROJECT_ID,DISABLE_BULLMQ=true,DISABLE_QUEUE_WORKER=true,FRONTEND_URL=https://bezhas.com,AUTH_BYPASS_ENABLED=false"
      - "--set-secrets"
      - "ALLOWED_ORIGINS=ALLOWED_ORIGINS:latest,STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest,STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest,JWT_SECRET=JWT_SECRET:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,GITHUB_CLIENT_ID=GITHUB_CLIENT_ID:latest,GITHUB_CLIENT_SECRET=GITHUB_CLIENT_SECRET:latest,RELAYER_PRIVATE_KEY=RELAYER_PRIVATE_KEY:latest,POLYGON_RPC_URL=POLYGON_RPC_URL:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,DEEPSEEK_API_KEY=DEEPSEEK_API_KEY:latest,PINATA_API_KEY=PINATA_API_KEY:latest,PINATA_SECRET_KEY=PINATA_SECRET_KEY:latest,GOVERNANCE_CONTRACT_ADDRESS=GOVERNANCE_CONTRACT_ADDRESS:latest,FARMING_CONTRACT_ADDRESS=FARMING_CONTRACT_ADDRESS:latest,MARKETPLACE_CONTRACT_ADDRESS=MARKETPLACE_CONTRACT_ADDRESS:latest,BEZCOIN_CONTRACT_ADDRESS=BEZCOIN_CONTRACT_ADDRESS:latest,CORE_CONTRACT_ADDRESS=CORE_CONTRACT_ADDRESS:latest,QUALITY_ESCROW_ADDRESS=QUALITY_ESCROW_ADDRESS:latest,QUALITY_ORACLE_ADDRESS=QUALITY_ORACLE_ADDRESS:latest,SUPER_ADMIN_WALLETS=SUPER_ADMIN_WALLETS:latest,ADMIN_WALLETS=ADMIN_WALLETS:latest,TREASURY_WALLET=TREASURY_WALLET:latest,COMMUNITY_WALLET=COMMUNITY_WALLET:latest,MCP_SERVER_URL=MCP_SERVER_URL:latest,TELEGRAM_BOT_TOKEN=TELEGRAM_BOT_TOKEN:latest,DISCORD_WEBHOOK_URL=DISCORD_WEBHOOK_URL:latest,LINKEDIN_CLIENT_ID=LINKEDIN_CLIENT_ID:latest,LINKEDIN_CLIENT_SECRET=LINKEDIN_CLIENT_SECRET:latest,ADMIN_TOKEN=ADMIN_TOKEN:latest,CONTACT_ENCRYPTION_KEY=CONTACT_ENCRYPTION_KEY:latest"
    id: "deploy-backend"
    waitFor: ["push-backend"]

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/bezhas-backend:${_TAG}"

timeout: "1200s"
