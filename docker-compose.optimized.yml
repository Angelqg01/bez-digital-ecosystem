# ============================================================================
# BeZhas Optimized Docker Compose — Full Stack with ChromaDB (RAG)
# ============================================================================
#
# Usage:
#   docker compose -f docker-compose.optimized.yml up -d
#
# Services:
#   - backend          : Node.js API server (port 3001)
#   - frontend         : Vite + Nginx (port 80)
#   - bezhas-intelligence : MCP AI Server (port 8080)
#   - postgres            : MongoDB 6.0 (port 27017)
#   - redis            : Redis 7 (port 6379)
#   - chromadb         : ChromaDB vector DB for RAG (port 8000)
# ============================================================================

version: '3.8'

services:
  # ── MongoDB ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: bezhas
      POSTGRES_PASSWORD: bezhas_password
      POSTGRES_DB: bezhas
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    command: ["mongod", "--wiredTigerCacheSizeGB", "0.5"]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── ChromaDB (Vector DB for RAG Pipeline) ───────────────────────
  chromadb:
    image: chromadb/chroma:0.4.24
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/heartbeat')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Backend API Server ──────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.gcp
    restart: unless-stopped
    ports:
      - "3001:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgresql://bezhas:bezhas_password@postgres:5432/bezhas
      - REDIS_URL=redis://redis:6379
      - MCP_SERVER_URL=http://bezhas-intelligence:8080
      - CHROMA_URL=http://chromadb:8000
      - BEZCOIN_CONTRACT_ADDRESS=0xEcBa873B534C54DE2B62acDE232ADCa4369f11A8
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      bezhas-intelligence:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # ── Frontend (Vite + Nginx) ─────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.gcp
      args:
        VITE_API_URL: http://localhost:3001
        VITE_WS_URL: ws://localhost:3001
        VITE_POLYGON_CHAIN_ID: "137"
        VITE_BEZCOIN_CONTRACT_ADDRESS: "0xEcBa873B534C54DE2B62acDE232ADCa4369f11A8"
        VITE_MCP_URL: http://localhost:8080
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # ── MCP Intelligence Server (AI Brain) ──────────────────────────
  bezhas-intelligence:
    build:
      context: ./packages/mcp-server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - HTTP_PORT=8080
      - POLYGON_RPC_URL=https://polygon-bor.publicnode.com
      - BEZ_CONTRACT_ADDRESS=0xEcBa873B534C54DE2B62acDE232ADCa4369f11A8
      - DATABASE_URL=postgresql://bezhas:bezhas_password@postgres:5432/bezhas
      - BACKEND_URL=http://backend:5000
    depends_on:
      mongo:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/api/mcp/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres-data:
  redis-data:
  chroma-data:
