name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-test:
    name: Build and Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.local/share/pnpm/store
          key: pnpm-deps-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-deps-

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Install api dependencies
        working-directory: ./api
        run: pnpm install --frozen-lockfile

      - name: Install frontend dependencies
        working-directory: ./frontend-next
        run: pnpm install --frozen-lockfile

      # ==========================================
      # 1. smart-contracts (Foundry at root)
      # ==========================================
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Run Solidity tests (Foundry)
        working-directory: ./
        run: forge test -vvv

      # ==========================================
      # 2. api backend (Jest)
      # ==========================================
      - name: Run Backend API Tests
        working-directory: ./api
        run: pnpm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-jwt-secret-key-12345
          DATABASE_URL: "sqlite://:memory:"

      # ==========================================
      # 3. frontend-next (Next.js)
      # ==========================================
      - name: Lint frontend (blocking)
        working-directory: ./frontend-next
        run: pnpm run lint

      - name: Build frontend
        working-directory: ./frontend-next
        run: pnpm run build

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          if-no-files-found: ignore
          path: |
            frontend-next/.next
            frontend-next/dist
