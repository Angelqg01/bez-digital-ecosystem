name: Publish SDK to npm & pnpm

# ──────────────────────────────────────────────────────────────────────────────
# Triggers:
#   - Automatic: push a version tag (v*) from the sdk/ directory
#   - Manual:    workflow_dispatch con opción de prerelease
# ──────────────────────────────────────────────────────────────────────────────
on:
  push:
    tags:
      - 'sdk/v*'          # e.g. sdk/v2.0.1, sdk/v3.0.0-beta.1
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to publish (e.g. 2.0.1)'
        required: true
      prerelease:
        description: 'Publish as prerelease (beta/next)'
        type: boolean
        default: false
      dry_run:
        description: 'Dry run (no actual publish)'
        type: boolean
        default: false

env:
  SDK_DIR: ./sdk
  MCP_DIR: ./packages/mcp-server
  NODE_VERSION: '20'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write   # To create GitHub releases
  packages: write   # For GitHub Packages registry

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1: Validate & Build
  # ────────────────────────────────────────────────────────────────────────────
  validate:
    name: Validate & Build SDK
    runs-on: ubuntu-latest
    outputs:
      sdk_version: ${{ steps.version.outputs.sdk_version }}
      mcp_version: ${{ steps.version.outputs.mcp_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Determine versions
        id: version
        run: |
          cd sdk
          SDK_VERSION=$(node -p "require('./package.json').version")
          echo "sdk_version=$SDK_VERSION" >> $GITHUB_OUTPUT
          if [ -f "../packages/mcp-server/package.json" ]; then
            MCP_VERSION=$(node -p "require('../packages/mcp-server/package.json').version")
            echo "mcp_version=$MCP_VERSION" >> $GITHUB_OUTPUT
          fi
          echo "📦 @bezhas/sdk@$SDK_VERSION"

      - name: Install SDK dependencies
        run: cd sdk && pnpm install --frozen-lockfile

      - name: Build SDK (webpack bundle)
        run: cd sdk && pnpm run build

      - name: Run SDK tests
        run: |
          cd sdk
          if [ -f "package.json" ] && grep -q '"test"' package.json; then
            pnpm test --if-present
          else
            echo "No test script configured, skipping..."
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdk-build
          path: |
            sdk/dist/
            sdk/*.js
            sdk/package.json
            sdk/README.md
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2: Publish @bezhas/sdk to npm registry
  # ────────────────────────────────────────────────────────────────────────────
  publish-npm:
    name: Publish to npm Registry
    runs-on: ubuntu-latest
    needs: validate
    environment: npm-production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (npm registry)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: sdk-build
          path: sdk/

      - name: Install dependencies
        run: cd sdk && pnpm install --frozen-lockfile

      - name: Set npm tag
        id: npm_tag
        run: |
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            echo "tag=beta" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Publish @bezhas/sdk to npm
        run: |
          cd sdk
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npm publish --dry-run --access public --tag ${{ steps.npm_tag.outputs.tag }}
            echo "🔍 Dry run completed — nothing was published"
          else
            npm publish --access public --tag ${{ steps.npm_tag.outputs.tag }}
            echo "✅ Published @bezhas/sdk@${{ needs.validate.outputs.sdk_version }} to npm"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3: Publish @bezhas/sdk to pnpm registry (same npm registry via pnpm)
  # ────────────────────────────────────────────────────────────────────────────
  publish-pnpm:
    name: Publish via pnpm
    runs-on: ubuntu-latest
    needs: [validate, publish-npm]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Install SDK dependencies via pnpm
        run: cd sdk && pnpm install --frozen-lockfile --ignore-scripts || pnpm install

      - name: Build SDK bundle via pnpm
        run: cd sdk && pnpm run build --if-present

      - name: Publish via pnpm to npm registry
        run: |
          cd sdk
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            pnpm publish --dry-run --access public --no-git-checks
            echo "🔍 pnpm dry run completed"
          else
            pnpm publish --access public --no-git-checks
            echo "✅ Published @bezhas/sdk via pnpm"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 4: Publish @bezhas/mcp-server to npm
  # ────────────────────────────────────────────────────────────────────────────
  publish-mcp:
    name: Publish @bezhas/mcp-server to npm
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.mcp_version != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Install MCP Server dependencies
        run: cd packages/mcp-server && pnpm install --frozen-lockfile || pnpm install

      - name: Build MCP Server (TypeScript)
        run: |
          cd packages/mcp-server
          pnpm run build --if-present || pnpm exec tsc --noEmit

      - name: Publish @bezhas/mcp-server
        run: |
          cd packages/mcp-server
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            pnpm publish --dry-run --access public --no-git-checks
          else
            pnpm publish --access public --no-git-checks
            echo "✅ Published @bezhas/mcp-server@${{ needs.validate.outputs.mcp_version }}"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 5: Create GitHub Release with changelogs
  # ────────────────────────────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-npm, publish-pnpm]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "@bezhas/sdk v${{ needs.validate.outputs.sdk_version }}"
          generate_release_notes: true
          files: |
            sdk/dist/*
            sdk/bezhas-sdk-*.tgz
          body: |
            ## @bezhas/sdk v${{ needs.validate.outputs.sdk_version }}

            ### Install
            ```bash
            # npm
            pnpm install @bezhas/sdk@${{ needs.validate.outputs.sdk_version }}

            # pnpm
            pnpm add @bezhas/sdk@${{ needs.validate.outputs.sdk_version }}

            # yarn
            yarn add @bezhas/sdk@${{ needs.validate.outputs.sdk_version }}
            ```

            ### What's included
            - 🔗 BeZhas Web3 SDK with 13 modules (marketplace, governance, defi, logistics, rwa, nft, vip...)
            - 🤖 @bezhas/mcp-server: 13 MCP tools (blockscout, github, tally, firecrawl, alpaca...)
            - 🌐 Polygon Mainnet & Amoy testnet support
            - 📦 CommonJS + ESM + browser bundle (UMD)

            See [QUICKSTART.md](./sdk/QUICKSTART.md) for usage examples.
